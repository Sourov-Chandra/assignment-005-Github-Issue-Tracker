<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github_Issue_Tracker</title>

    <!-- daisyUI and tailwind cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">


       <!-- fontawesome cdn -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
            crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body class="bg-[#F8FAFC] min-h-screen">
<header>
    <div class="navbar bg-base-100 shadow-sm px-4">
        <div class="flex-1 flex items-center gap-2">
            <a class="btn btn-ghost p-1">
                <img src="./assets/github-logo.png" alt="logo" class="w-8 h-8 object-contain" />
            </a>
            <h1 class="text-sm md:text-xl font-semibold ">GitHub Issues Tracker</h1>
        </div>

        <div class="flex items-center gap-2">
            
            <div class="relative">
                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 z-10">
                    <i class="fa-brands fa-sistrix"></i>
                </span>
                <input type="text" placeholder="Search issues..."
                    class="input input-bordered input-sm md:input-md w-28 sm:w-40 md:w-64 pl-8" />
            </div>
        
            <button class="btn btn-primary btn-sm md:btn-md hover:btn-outline">
                <span class="hidden sm:block">Search</span>
                <span class="block sm:hidden text-base">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </span>
            </button>
        
        </div>
    </div>
</header>

<!-- all tab -->
<section class="container mx-auto  mt-10">
    <div class="px-5 py-6"> 
        <button id="allBtn" class="btn btn-outline ">All</button>
        <button id="openBtn" class="btn btn-outline ">Open</button>
        <button id="closeBtn" class="btn btn-outline ">Close</button>
    </div>
</section>

<!-- all issue -->
<section class="container mx-auto bg-[#FBFBFB] mt-8 shadow-md rounded-xl overflow-hidden">

    <div
        class="flex flex-col md:flex-row justify-between items-start md:items-center bg-white px-5 py-6 border-b border-gray-300 gap-4">
        <div class="flex items-center gap-4">
            <div class="flex-shrink-0 w-12 h-12 bg-[#ECE4FF] flex justify-center items-center rounded-full">
                <img src="./assets/Aperture.png" alt="Project Icon" class="w-6 h-6">
            </div>
            <div>
                <h2 class="text-xl font-bold text-gray-900 leading-tight">50 Issues</h2>
                <p class="text-sm text-[#64748B]">Track and manage your project issues</p>
            </div>
        </div>

        <div class="flex items-center gap-6 w-full md:w-auto justify-start md:justify-end">
            <div class="flex items-center gap-2">
                <span class="w-3 h-3 bg-[#00A96E] rounded-full"></span>
                <p class="text-sm font-medium text-gray-700">Open</p>
            </div>
            <div class="flex items-center gap-2">
                <span class="w-3 h-3 bg-[#A855F7] rounded-full"></span>
                <p class="text-sm font-medium text-gray-700">Close</p>
            </div>
        </div>
    </div>

    <!-- card dynamically add here -->
    <div id="card-container" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 px-5 py-6">

        <div
            class="card bg-white shadow-sm border border-gray-200 p-5 rounded-xl hover:shadow-md transition-all flex flex-col justify-between">
            <div>
                <div class="flex items-center justify-between mb-3">
                    <span class="bg-[#00A96E] text-white text-[10px] px-2 py-1 rounded-full flex items-center gap-1">
                        <i class="fa-solid fa-circle text-[6px]"></i> Open
                    </span>
                    <span class="border border-red-500 text-red-500 text-[10px] font-bold px-2 py-1 rounded uppercase">
                        High
                    </span>
                </div>

                <h2 class="text-base font-semibold text-gray-800 mb-2 line-clamp-2">
                    Fix navigation menu on mobile devices
                </h2>

                <p class="text-sm text-gray-500 mb-4 line-clamp-3">
                    The navigation menu doesn't collapse properly on mobile devices. Need to fix the responsive
                    behavior.
                </p>

                <div class="flex flex-wrap gap-2 mb-4">
                    <span class="border border-orange-400 text-orange-600 text-[10px] px-2 py-0.5 rounded-md">bug</span>
                    <span class="border border-orange-400 text-orange-600 text-[10px] px-2 py-0.5 rounded-md">help
                        wanted</span>
                </div>
            </div>

            <div
                class="flex items-center justify-between text-[11px] text-gray-400 border-t border-gray-100 pt-3 mt-auto">
                <div class="flex gap-3">
                    <span class="flex items-center gap-1"><i class="fa-solid fa-user"></i> john_doe</span>
                    <span class="flex items-center gap-1"><i class="fa-solid fa-user-check"></i> jane_smith</span>
                </div>
                <span class="flex items-center gap-1"><i class="fa-regular fa-calendar"></i> Jan 15</span>
            </div>
        </div>

    </div>

</section>

<script src="./script.js"></script>

</body>
</html>
