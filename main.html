<body class="bg-[#F8FAFC] min-h-screen">
<header>
    <div class="navbar bg-base-100 shadow-sm px-4">
        <div class="flex-1 flex items-center gap-2">
            <a class="btn btn-ghost p-1">
                <img src="./assets/github-logo.png" alt="logo" class="w-8 h-8 object-contain" />
            </a>
            <h1 class="text-sm md:text-xl font-semibold ">GitHub Issues Tracker</h1>
        </div>

        <div class="flex items-center gap-2">
            
            <div class="relative">
                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 z-10">
                    <i class="fa-brands fa-sistrix"></i>
                </span>
                <input type="text" placeholder="Search issues..."
                    class="input input-bordered input-sm md:input-md w-28 sm:w-40 md:w-64 pl-8" />
            </div>
        
            <button class="btn btn-primary btn-sm md:btn-md hover:btn-outline">
                <span class="hidden sm:block">Search</span>
                <span class="block sm:hidden text-base">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </span>
            </button>
        
        </div>
    </div>
</header>

<!-- all tab -->
<section class="container mx-auto  mt-10">
    <div class="px-5 py-6"> 
        <button id="allBtn" class="btn btn-primary">All</button>
        <button id="openBtn" class="btn btn-outline">Open</button>
        <button id="closeBtn" class="btn btn-outline">Close</button>
    </div>
</section>

            </div>
            <div>
                <h2 id="issue-count" class="text-xl font-bold text-gray-900 leading-tight">0 Issues</h2>
                <p class="text-sm text-[#64748B]">Track and manage your project issues</p>
            </div>
        </div>

        <div class="flex items-center gap-6 w-full md:w-auto justify-start md:justify-end">
            <div class="flex items-center gap-2">
                <span class="w-3 h-3 bg-[#00A96E] rounded-full"></span>
                <p class="text-sm font-medium text-gray-700">Open</p>
            </div>
            <div class="flex items-center gap-2">
                <span class="w-3 h-3 bg-[#A855F7] rounded-full"></span>
                <p class="text-sm font-medium text-gray-700">Close</p>
            </div>
        </div>
    </div>

<!-- modal -->
<!-- Open the modal using ID.showModal() method -->
<!-- <button class="btn" onclick="my_modal_1.showModal()">open modal</button> -->
<!-- modal -->
<dialog id="issue_details_modal" class="modal">
    <div class="modal-box w-11/12 max-w-2xl">


        <div class="flex items-center justify-between mb-4">
            <span id="modal-status"
                class="text-sm font-bold px-2 py-1 rounded-full flex items-center gap-1 border"></span>
            <span id="modal-priority" class="border text-sm font-bold px-2 py-1 rounded uppercase"></span>
        </div>

        <h3 id="modal-title" class="text-lg font-bold text-gray-800 mb-2"></h3>

        <p id="modal-description" class="text-sm text-gray-500 mb-4"></p>

        <div id="modal-labels" class="flex flex-wrap gap-2 mb-4"></div>

        <div class="text-sm text-gray-400 border-t border-gray-100 pt-4 flex items-center justify-between">
            <div class="flex flex-col gap-1">
                <p><span class="text-gray-600 font-medium">Author:</span> <span id="modal-author"></span></p>
                <p><span class="text-gray-600 font-medium">Assignee:</span> <span id="modal-assignee"></span></p>
            </div>
            <div class="flex flex-col gap-1 text-right">
                <p><span class="text-gray-600 font-medium">Created:</span> <span id="modal-created"></span></p>
                <p><span class="text-gray-600 font-medium">Updated:</span> <span id="modal-updated"></span></p>
            </div>
        </div>


        <div class="modal-action">
            <form method="dialog">
                <button class="btn">Close</button>
            </form>
        </div>
    </div>
</dialog>
